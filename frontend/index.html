<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Processing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css?v=2">
</head>

<body>
    <div class="container">
        <header>
            <h1>AI Document Processing</h1>
            <p>Upload a document to extract and validate data (Name, Amount, Date, ID)</p>
        </header>

        <main>
            <section class="upload-section">
                <form id="uploadForm">
                    <div class="file-drop-area" id="dropArea">
                        <span class="file-msg">Drag & Drop your image or PDF here or click to browse</span>
                        <input type="file" id="fileInput" name="file" accept="image/*,application/pdf" required>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">Process Document</button>
                </form>
                <div id="loadingIndicator" class="hidden">
                    <div class="spinner"></div>
                    <p>Analyzing document...</p>
                </div>
            </section>

            <section id="resultsSection" class="results-section hidden">
                <div class="result-card">
                    <h2>Extracted Data & Validation</h2>
                    <div id="validationSummary" class="status-badge"></div>

                    <div id="recordsContainer">
                        <!-- Dynamic generated invoice records will go here -->
                    </div>
                </div>

                <div class="result-card raw-text-card">
                    <h2>Raw OCR Output</h2>
                    <pre id="rawText"></pre>
                </div>
            </section>
        </main>
    </div>

    <script src="src/js/main.js?v=2"></script>
</body>

</html>
